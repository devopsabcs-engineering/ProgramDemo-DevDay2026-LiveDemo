# ============================================================================
# Spring Boot Application Configuration - Azure SQL Profile
# ============================================================================

# ============================================================================
# Azure SQL Database Configuration
# ============================================================================
spring.datasource.url=${AZURE_SQL_URL:jdbc:sqlserver://localhost:1433;databaseName=civicdb;encrypt=true;trustServerCertificate=false}
spring.datasource.username=${AZURE_SQL_USERNAME:admin}
spring.datasource.password=${AZURE_SQL_PASSWORD:}
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ============================================================================
# JPA / Hibernate Configuration for Azure SQL
# ============================================================================
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ============================================================================
# Flyway Migration Configuration
# ============================================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ============================================================================
# Disable H2 Console in Production
# ============================================================================
spring.h2.console.enabled=false

# ============================================================================
# Logging Configuration (Production)
# ============================================================================
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.com.ontario.program=INFO
