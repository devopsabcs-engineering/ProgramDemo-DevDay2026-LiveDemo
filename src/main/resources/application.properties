# ============================================================================
# Spring Boot Application Configuration
# ============================================================================

spring.application.name=civic-program-api

# ============================================================================
# H2 Database Configuration (Local Development)
# ============================================================================
spring.datasource.url=jdbc:h2:mem:civicdb;MODE=MSSQLServer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (accessible at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ============================================================================
# JPA / Hibernate Configuration
# ============================================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================================
# Flyway Migration Configuration
# ============================================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ============================================================================
# Server Configuration
# ============================================================================
server.port=8080

# ============================================================================
# Logging Configuration
# ============================================================================
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.ontario.program=DEBUG
